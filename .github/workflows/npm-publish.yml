name: npm publish

on:
  workflow_dispatch:
    inputs:
      publish_js_connector:
        description: "Also publish @1dex-fr/connector (requires npm trusted publisher configured for that package)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/npm-publish.yml"
      - "cli/**"
      - "packages/js/**"

permissions:
  contents: read
  id-token: write

jobs:
  changes:
    name: Detect packages to publish
    runs-on: ubuntu-latest
    outputs:
      cli: ${{ steps.detect.outputs.cli }}
      js: ${{ steps.detect.outputs.js }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect package changes
        id: detect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "cli=true" >> "${GITHUB_OUTPUT}"
            echo "js=${{ inputs.publish_js_connector }}" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          BASE="${{ github.event.before }}"
          if [[ -z "${BASE}" || "${BASE}" =~ ^0+$ ]]; then
            BASE="HEAD^"
          fi
          FILES="$(git diff --name-only "${BASE}" "${{ github.sha }}" || git diff --name-only HEAD^ HEAD)"

          if grep -Eq '(^cli/|^\.github/workflows/npm-publish\.yml$)' <<< "${FILES}"; then
            echo "cli=true" >> "${GITHUB_OUTPUT}"
          else
            echo "cli=false" >> "${GITHUB_OUTPUT}"
          fi

          if grep -Eq '(^packages/js/|^\.github/workflows/npm-publish\.yml$)' <<< "${FILES}"; then
            echo "js=true" >> "${GITHUB_OUTPUT}"
          else
            echo "js=false" >> "${GITHUB_OUTPUT}"
          fi

  publish-cli:
    name: Publish CLI package
    needs: changes
    if: needs.changes.outputs.cli == 'true'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up npm trusted publishing support
        run: |
          npm install -g npm@latest
          npm --version

      - name: Run CI checks
        run: npm run ci

      - name: Read package version
        id: package
        working-directory: cli
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "::notice::${NAME}@${VERSION} is already published on npm; skipping publish."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::${NAME}@${VERSION} is not published yet; publishing from cli/."
          fi

      - name: Validate publish package
        if: steps.package.outputs.exists == 'false'
        run: npm publish --dry-run --access public
        working-directory: cli

      - name: Publish package
        if: steps.package.outputs.exists == 'false'
        run: npm publish --access public --provenance
        working-directory: cli

  publish-js-connector:
    name: Publish JS connector package
    needs: changes
    if: needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up npm trusted publishing support
        run: |
          npm install -g npm@latest
          npm --version

      - name: Run CI checks
        run: npm run ci

      - name: Read package version
        id: package
        working-directory: packages/js
        run: |
          NAME="$(node -p "require('./package.json').name")"
          VERSION="$(node -p "require('./package.json').version")"
          echo "name=${NAME}" >> "${GITHUB_OUTPUT}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "::notice::${NAME}@${VERSION} is already published on npm; skipping publish."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::${NAME}@${VERSION} is not published yet; publishing from packages/js/."
          fi

      - name: Validate publish package
        if: steps.package.outputs.exists == 'false'
        run: npm publish --dry-run --access public
        working-directory: packages/js

      - name: Publish package
        if: steps.package.outputs.exists == 'false'
        run: npm publish --access public --provenance
        working-directory: packages/js
