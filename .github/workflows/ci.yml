name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Build docs and test connectors
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run CI checks
        run: npm run ci

      - name: Pack JS package
        run: npm --cache /tmp/onedex-npm-cache pack --dry-run
        working-directory: packages/js

      - name: Pack CLI package
        run: npm --cache /tmp/onedex-npm-cache pack --dry-run
        working-directory: cli
