[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "onedex"
version = "0.1.0"
description = "Public Python connector for the 1dex API."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
  { name = "1dex" }
]
dependencies = []

[tool.setuptools.packages.find]
where = ["src"]
