[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "1dex-connector"
version = "0.1.3"
description = "Python connector for the public and professional 1dex API surface: overview, subscriber address details, autocomplete, score, preview, account usage, and map routes."
readme = "README.md"
requires-python = ">=3.9"
license = "MIT"
license-files = ["LICENSE"]
authors = [
  { name = "1dex" }
]
dependencies = []

[project.urls]
Homepage = "https://blipn.github.io/1dex-connector/"
Documentation = "https://blipn.github.io/1dex-connector/quickstart.html"
Source = "https://github.com/blipn/1dex-connector"
"API documentation" = "https://1dex.fr/developpeurs/api"

[tool.setuptools.packages.find]
where = ["src"]
